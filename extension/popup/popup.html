<!DOCTYPE html>
<!--
  Guardian Shield — Popup (Minimale versie)
  Bestandslocatie in project: /guardian-shield/extension/popup/popup.html
  Wordt volledig uitgebreid in Fase 1, Stap 1.6.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Shield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header img { width: 32px; height: 32px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .version { font-size: 11px; color: #64748b; }

    .status-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      margin-bottom: 12px;
    }
    .status-icon { font-size: 36px; margin-bottom: 8px; }
    .status-text { font-size: 14px; font-weight: 500; }
    .status-domain { font-size: 12px; color: #94a3b8; margin-top: 4px; word-break: break-all; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-item {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-number { font-size: 18px; font-weight: 700; color: #38bdf8; }
    .stat-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #475569;
      padding-top: 8px;
    }

    /* Kleuren per status */
    .status-safe { border-left: 4px solid #22c55e; }
    .status-suspicious { border-left: 4px solid #f59e0b; }
    .status-dangerous { border-left: 4px solid #ef4444; }
    .status-unknown { border-left: 4px solid #6b7280; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-32.png" alt="Guardian Shield">
    <div>
      <h1>Guardian Shield</h1>
      <div class="version" id="version">v0.1.0</div>
    </div>
  </div>

  <div class="status-card status-unknown" id="statusCard">
    <div class="status-icon" id="statusIcon">🛡️</div>
    <div class="status-text" id="statusText">Bezig met analyseren...</div>
    <div class="status-domain" id="statusDomain"></div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-number" id="sitesScanned">0</div>
      <div class="stat-label">Sites gescand</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="threatsBlocked">0</div>
      <div class="stat-label">Dreigingen gestopt</div>
    </div>
  </div>

  <div class="footer">
    Guardian Shield — Gratis &amp; Open Source
  </div>

  <script src="popup.js"></script>
</body>
</html>
